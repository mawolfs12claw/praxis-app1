<!DOCTYPE html>
<!-- PRAXIS-MANAGER (lokal) - Alle Daten bleiben nur in diesem Browser (localStorage), keine Cloud.
     Nutzung: Datei als index.html speichern, im Handy-Browser öffnen, optional "Zum Home-Bildschirm hinzufügen".
     Regelmäßig in den Einstellungen ein Backup (JSON) exportieren! -->
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#047857">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Praxis">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23047857'/%3E%3Cpath d='M50 18C32 35 32 65 50 82C68 65 68 35 50 18Z' fill='%23ecfdf5'/%3E%3Cpath d='M50 30v44M38 42c6 6 18 6 24 0M38 58c6-6 18-6 24 0' stroke='%23047857' stroke-width='3' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>Praxis-Manager</title>
<style>
:root{--bg:#fafaf9;--card:#ffffff;--border:#e7e5e4;--text:#44403c;--text-light:#a8a29e;--primary:#047857;--primary-light:#059669;--primary-bg:#ecfdf5;--accent:#d97706;--accent-bg:#fffbeb;--danger:#e11d48;--danger-bg:#fff1f2;--radius:16px;}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);}
#app{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
.header{background:var(--primary);color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;}
.header-sub{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#a7f3d0;}
.header-title{font-size:18px;font-weight:600;}
main{flex:1;padding:16px;padding-bottom:90px;overflow-y:auto;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:640px;margin:0 auto;background:#fff;border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0;}
.bottom-nav button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:11px;color:var(--text-light);padding:4px 8px;border-radius:8px;cursor:pointer;}
.bottom-nav button span{font-size:18px;}
.bottom-nav button.active{color:var(--primary);}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.03);}
.card h3{margin:0 0 12px;font-size:15px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.stat{border-radius:var(--radius);padding:12px;border:1px solid;}
.stat-emerald{background:var(--primary-bg);border-color:#d1fae5;color:var(--primary);}
.stat-amber{background:var(--accent-bg);border-color:#fde68a;color:var(--accent);}
.stat-label{font-size:11px;text-transform:uppercase;opacity:.7;}
.stat-value{font-size:17px;font-weight:600;margin-top:4px;}
.list-row{display:flex;justify-content:space-between;align-items:center;background:var(--bg);border-radius:12px;padding:10px 12px;margin-bottom:8px;gap:8px;}
.list-row:last-child{margin-bottom:0;}
.row-title{font-weight:500;}
.muted{color:var(--text-light);font-size:13px;}
.italic{font-style:italic;}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;white-space:nowrap;}
.badge-stone{background:#f5f5f4;color:#78716c;}
.badge-emerald{background:#d1fae5;color:#047857;}
.badge-rose{background:#ffe4e6;color:#e11d48;}
.badge-amber{background:#fef3c7;color:#d97706;}
.btn{border:none;border-radius:12px;padding:12px 16px;font-weight:600;cursor:pointer;font-size:14px;}
.btn-primary{background:var(--primary-light);color:#fff;}
.btn-accent{background:var(--accent);color:#fff;}
.btn-full{width:100%;margin-top:8px;}
.btn-stone{background:#f5f5f4;color:#57534e;}
.btn:disabled{background:#d6d3d1;color:#a8a29e;cursor:not-allowed;}
.input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-size:14px;margin-bottom:10px;font-family:inherit;}
.field-label{display:block;font-size:13px;font-weight:500;color:#78716c;margin-bottom:4px;}
.row-gap{display:flex;gap:8px;margin-bottom:12px;}
.search-wrap{flex:1;}
.row-between{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;}
.row-actions{display:flex;gap:4px;}
.icon-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:4px;color:var(--text-light);border-radius:6px;}
.icon-btn:hover{color:var(--text);}
.center{text-align:center;padding:24px 0;}
.banner{background:var(--accent-bg);border:1px solid #fde68a;border-radius:var(--radius);padding:12px 16px;font-size:13px;color:#92400e;margin-bottom:12px;}
.banner a{color:#92400e;font-weight:600;text-decoration:underline;cursor:pointer;}
.modal-overlay{position:fixed;inset:0;background:rgba(68,64,60,.4);display:flex;align-items:center;justify-content:center;padding:16px;z-index:100;}
.modal{background:#fff;border-radius:20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;}
.modal-header h3{margin:0;font-size:17px;}
.modal-body{padding:20px;}
.tabs{display:flex;background:#fff;border:1px solid var(--border);border-radius:10px;padding:4px;flex:1;}
.tabs button{flex:1;border:none;background:none;padding:8px;border-radius:8px;font-size:13px;color:var(--text-light);cursor:pointer;}
.tabs button.active{background:var(--primary-light);color:#fff;}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 12px;}
.chip{border:none;border-radius:999px;padding:6px 12px;font-size:12px;cursor:pointer;}
.chip-stone{background:#f5f5f4;color:#57534e;}
.chip-emerald{background:#d1fae5;color:#047857;}
.item-row{display:flex;gap:6px;flex-wrap:wrap;background:var(--bg);border-radius:10px;padding:8px;margin-bottom:8px;align-items:center;}
.item-row .input{margin-bottom:0;}
.item-desc{flex:1;min-width:120px;}
.item-qty{width:55px;}
.item-price{width:80px;}
.item-vat{width:70px;}
.totals-box{background:var(--bg);border-radius:10px;padding:12px;font-size:14px;margin-bottom:8px;}
.totals-line{display:flex;justify-content:space-between;padding:2px 0;}
.totals-sum{font-weight:700;border-top:1px solid var(--border);margin-top:4px;padding-top:6px;color:var(--text);}
.actions-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.action-chip{border:none;border-radius:999px;padding:7px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;}
table.book-table{width:100%;font-size:13px;border-collapse:collapse;}
table.book-table th{text-align:left;color:var(--text-light);border-bottom:1px solid var(--border);padding:6px 4px;font-weight:500;}
table.book-table td{padding:6px 4px;border-bottom:1px solid #f5f5f4;}
table.book-table .num{text-align:right;}
.invoice-print{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;font-size:13px;}
.invoice-print table{width:100%;border-collapse:collapse;margin:12px 0;}
.invoice-print th{text-align:left;color:var(--text-light);border-bottom:1px solid var(--border);padding:4px 0;}
.invoice-print td{padding:5px 0;border-bottom:1px solid #f5f5f4;}
.year-nav{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;margin-bottom:12px;}
.year-nav button{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-light);}
.calendar-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.calendar-nav .cal-title{font-weight:600;}
.calendar-nav-actions{display:flex;align-items:center;gap:8px;}
.calendar-nav button{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-light);padding:0 4px;}
.calendar-today-btn{background:#f5f5f4;color:#57534e;border-radius:999px;padding:4px 10px;font-size:12px;cursor:pointer;border:none;}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.calendar-weekday{text-align:center;font-size:11px;color:var(--text-light);font-weight:600;padding:4px 0;}
.calendar-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;font-size:13px;position:relative;background:var(--bg);border:2px solid transparent;}
.calendar-day.empty{visibility:hidden;cursor:default;}
.calendar-day.today{border-color:var(--primary);}
.calendar-day.selected{background:var(--primary-light);color:#fff;}
.calendar-day .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);position:absolute;bottom:5px;}
.calendar-day.selected .dot{background:#fff;}
@media print{.header,.bottom-nav,.modal-header,.actions-row{display:none !important;}.modal-overlay{position:static;background:none;padding:0;}.modal{box-shadow:none;max-height:none;}}
</style>
</head>
<body>
<div id="app">
  <header class="header">
    <div>
      <div class="header-sub" id="header-business"></div>
      <div class="header-title" id="header-title"></div>
    </div>
    <button class="icon-btn" id="settings-btn" style="font-size:22px">⚙️</button>
  </header>
  <main id="main"></main>
  <nav class="bottom-nav">
    <button data-view="dashboard"><span>🏠</span>Start</button>
    <button data-view="clients"><span>👥</span>Kunden</button>
    <button data-view="appointments"><span>📅</span>Termine</button>
    <button data-view="invoices"><span>🧾</span>Rechnungen</button>
    <button data-view="bookkeeping"><span>💰</span>Buchhaltung</button>
  </nav>
  <div id="modal-root"></div>
</div>
<script>
const STORAGE_KEY='praxis-data-v1';
const uid=()=>Math.random().toString(36).slice(2,10);
const todayISO=()=>new Date().toISOString().split('T')[0];
const fmtMoney=(n)=>(n||0).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
const fmtDate=(iso)=>{ if(!iso) return ''; const [y,m,d]=iso.split('-'); return `${d}.${m}.${y}`; };
const monthNames=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const weekdayNames=['Mo','Di','Mi','Do','Fr','Sa','So'];
const expenseCategories=['Fahrtkosten','Material & Verbrauch','Fortbildung','Versicherung','Miete/Praxis','Werbung','Sonstiges'];

const defaultServices=[
  {id:'srv1',name:'Klassische Massage 30 Min',duration:30,price:40,vat:19},
  {id:'srv2',name:'Klassische Massage 45 Min',duration:45,price:55,vat:19},
  {id:'srv3',name:'Klassische Massage 60 Min',duration:60,price:70,vat:19},
  {id:'srv4',name:'Fahrtkosten / Hausbesuch',duration:0,price:10,vat:19},
];
const defaultSettings={businessName:'Praxis für Massage',ownerName:'',street:'',zipCity:'',taxId:'',email:'',phone:'',iban:'',invoicePrefix:'2026',invoiceCounter:1};

let data={clients:[],appointments:[],services:defaultServices,invoices:[],expenses:[],settings:defaultSettings};
let currentView='dashboard';
let clientSearch='';
let apptFilter='upcoming';
let apptViewMode='list';
let calendarDate=new Date();
let calendarSelected=todayISO();
let invFilter='all';
let bookYear=new Date().getFullYear();

function loadData(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){
      const p=JSON.parse(raw);
      data={
        clients:p.clients||[], appointments:p.appointments||[],
        services:(p.services&&p.services.length)?p.services:defaultServices,
        invoices:p.invoices||[], expenses:p.expenses||[],
        settings:{...defaultSettings, ...(p.settings||{})}
      };
    }
  }catch(e){ console.error('Laden fehlgeschlagen',e); }
}
function saveData(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  catch(e){ alert('Speichern fehlgeschlagen. Eventuell ist der Speicher voll.'); }
}
function esc(str){ const div=document.createElement('div'); div.textContent=str??''; return div.innerHTML; }
function invoiceTotal(invoice){
  let net=0,vat=0;
  (invoice.items||[]).forEach(item=>{
    const lineNet=(item.qty||0)*(item.price||0);
    net+=lineNet; vat+=lineNet*((item.vat||0)/100);
  });
  return {net,vat,gross:net+vat};
}
function serviceName(id){ return data.services.find(s=>s.id===id)?.name||'Leistung'; }
function clientName(id){ return data.clients.find(c=>c.id===id)?.name||'Unbekannt'; }
function nextInvoiceNumber(){ return `${data.settings.invoicePrefix}-${String(data.settings.invoiceCounter).padStart(3,'0')}`; }
function badge(status){
  const labels={geplant:'Geplant',erledigt:'Erledigt',abgesagt:'Abgesagt',offen:'Offen',bezahlt:'Bezahlt'};
  const cls={geplant:'badge-stone',erledigt:'badge-emerald',abgesagt:'badge-rose',offen:'badge-amber',bezahlt:'badge-emerald'};
  return `<span class="badge ${cls[status]||'badge-stone'}">${labels[status]||status}</span>`;
}
function downloadFile(filename,content,type){
  const blob=new Blob([content],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}
function getCalendarDays(year,month){
  const firstDay=new Date(year,month,1);
  const startWeekday=(firstDay.getDay()+6)%7;
  const daysInMonth=new Date(year,month+1,0).getDate();
  const days=[];
  for(let i=0;i<startWeekday;i++) days.push(null);
  for(let d=1;d<=daysInMonth;d++) days.push(d);
  while(days.length%7!==0) days.push(null);
  return days;
}

/* ---- iCalendar (.ics) Export für Google Kalender ---- */
function icsTimestamp(d){ return d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z'; }
function icsLocalDateTime(dateStr,timeStr){ return dateStr.replace(/-/g,'')+'T'+timeStr.replace(':','')+'00'; }
function addMinutes(timeStr,minutes){
  const [h,m]=timeStr.split(':').map(Number);
  const total=h*60+m+minutes;
  const nh=Math.floor(total/60)%24;
  const nm=total%60;
  return `${String(nh).padStart(2,'0')}:${String(nm).padStart(2,'0')}`;
}
function icsEscape(str){ return String(str).replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n'); }
function generateICS(appts,includeNames){
  let ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Praxis Manager//DE\r\nCALSCALE:GREGORIAN\r\n';
  const stamp=icsTimestamp(new Date());
  appts.forEach(a=>{
    const service=data.services.find(s=>s.id===a.serviceId);
    const duration=service&&service.duration>0?service.duration:30;
    const start=icsLocalDateTime(a.date,a.time);
    const end=icsLocalDateTime(a.date,addMinutes(a.time,duration));
    const summary=includeNames?`Massage: ${clientName(a.clientId)}`:'Massagetermin';
    const desc=serviceName(a.serviceId)+(a.notes?' - '+a.notes:'');
    ics+='BEGIN:VEVENT\r\n';
    ics+=`UID:${a.id}@praxis-manager\r\n`;
    ics+=`DTSTAMP:${stamp}\r\n`;
    ics+=`DTSTART:${start}\r\n`;
    ics+=`DTEND:${end}\r\n`;
    ics+=`SUMMARY:${icsEscape(summary)}\r\n`;
    ics+=`DESCRIPTION:${icsEscape(desc)}\r\n`;
    ics+='END:VEVENT\r\n';
  });
  ics+='END:VCALENDAR\r\n';
  return ics;
}

const viewTitles={dashboard:'Übersicht',clients:'Kunden',appointments:'Termine',invoices:'Rechnungen',bookkeeping:'Buchhaltung',settings:'Einstellungen'};
function setView(v){ currentView=v; render(); }

function render(){
  document.getElementById('header-title').textContent=viewTitles[currentView];
  document.getElementById('header-business').textContent=data.settings.businessName||'Praxis';
  document.getElementById('settings-btn').style.display=currentView==='settings'?'none':'';
  const main=document.getElementById('main');
  if(currentView==='dashboard'){ main.innerHTML=renderDashboard(); attachDashboardListeners(); }
  else if(currentView==='clients'){ main.innerHTML=renderClients(); attachClientsListeners(); }
  else if(currentView==='appointments'){ main.innerHTML=renderAppointments(); attachAppointmentsListeners(); }
  else if(currentView==='invoices'){ main.innerHTML=renderInvoices(); attachInvoicesListeners(); }
  else if(currentView==='bookkeeping'){ main.innerHTML=renderBookkeeping(); attachBookkeepingListeners(); }
  else if(currentView==='settings'){ main.innerHTML=renderSettings(); attachSettingsListeners(); }
  document.querySelectorAll('.bottom-nav button').forEach(btn=>btn.classList.toggle('active', btn.dataset.view===currentView));
}

/* ---- Modal ---- */
function openModal(html){
  document.getElementById('modal-root').innerHTML=`<div class="modal-overlay" id="modal-overlay"><div class="modal" id="modal-inner">${html}</div></div>`;
  document.getElementById('modal-overlay').addEventListener('click',(e)=>{ if(e.target.id==='modal-overlay') closeModal(); });
}
function closeModal(){ document.getElementById('modal-root').innerHTML=''; }

/* ---- Dashboard ---- */
function renderDashboard(){
  const today=todayISO();
  const todayAppts=data.appointments.filter(a=>a.date===today&&a.status!=='abgesagt').sort((a,b)=>a.time.localeCompare(b.time));
  const upcoming=data.appointments.filter(a=>a.date>today&&a.status==='geplant').sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)).slice(0,5);
  const openInvoices=data.invoices.filter(i=>i.status==='offen');
  const openSum=openInvoices.reduce((s,i)=>s+invoiceTotal(i).gross,0);
  const now=new Date();
  const monthKey=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const monthRevenue=data.invoices.filter(i=>i.status==='bezahlt'&&i.paidDate&&i.paidDate.startsWith(monthKey)).reduce((s,i)=>s+invoiceTotal(i).gross,0);
  const showOnboarding=data.clients.length===0&&data.appointments.length===0;
  return `
    ${showOnboarding?`<div class="banner">Willkommen! Lege zuerst unter <a data-goto="clients">Kunden</a> deinen ersten Klienten an und unter <a data-goto="settings">Einstellungen</a> deine Praxisdaten und Leistungen.</div>`:''}
    <div class="grid-2">
      <div class="stat stat-emerald"><div class="stat-label">Umsatz diesen Monat</div><div class="stat-value">${fmtMoney(monthRevenue)}</div></div>
      <div class="stat stat-amber"><div class="stat-label">Offene Rechnungen</div><div class="stat-value">${openInvoices.length} · ${fmtMoney(openSum)}</div></div>
    </div>
    <div class="card">
      <h3>📅 Heute</h3>
      ${todayAppts.length===0?'<p class="muted">Keine Termine heute.</p>':todayAppts.map(a=>`
        <div class="list-row"><div><div class="row-title">${a.time} – ${esc(clientName(a.clientId))}</div><div class="muted">${esc(serviceName(a.serviceId))}</div></div>${badge(a.status)}</div>`).join('')}
    </div>
    <div class="card">
      <h3>⏰ Nächste Termine</h3>
      ${upcoming.length===0?'<p class="muted">Keine weiteren Termine geplant.</p>':upcoming.map(a=>`
        <div class="list-row"><div><div class="row-title">${fmtDate(a.date)}, ${a.time} – ${esc(clientName(a.clientId))}</div><div class="muted">${esc(serviceName(a.serviceId))}</div></div></div>`).join('')}
    </div>
    <div class="grid-2">
      <button class="btn btn-primary" data-goto="appointments">+ Termin</button>
      <button class="btn btn-accent" data-goto="invoices">+ Rechnung</button>
    </div>`;
}
function attachDashboardListeners(){
  document.querySelectorAll('[data-goto]').forEach(el=>el.addEventListener('click',()=>setView(el.dataset.goto)));
}

/* ---- Clients ---- */
function renderClients(){
  const filtered=data.clients.filter(c=>c.name.toLowerCase().includes(clientSearch.toLowerCase()));
  return `
    <div class="row-gap">
      <div class="search-wrap"><input id="client-search" class="input" placeholder="Kunde suchen..." value="${esc(clientSearch)}" style="margin-bottom:0"></div>
      <button class="btn btn-primary" id="add-client-btn">+ Neu</button>
    </div>
    <div id="client-list">${renderClientList(filtered)}</div>`;
}
function renderClientList(list){
  if(list.length===0) return '<p class="muted center">Noch keine Kunden angelegt.</p>';
  return list.map(c=>`
    <div class="card">
      <div class="row-between">
        <div>
          <div class="row-title">${esc(c.name)}</div>
          ${c.street?`<div class="muted">📍 ${esc(c.street)}, ${esc(c.zipCity)}</div>`:''}
          ${c.phone?`<div class="muted">📞 ${esc(c.phone)}</div>`:''}
          ${c.email?`<div class="muted">✉️ ${esc(c.email)}</div>`:''}
          ${c.notes?`<div class="muted italic">${esc(c.notes)}</div>`:''}
        </div>
        <div class="row-actions">
          <button class="icon-btn" data-history-client="${c.id}" title="Behandlungsverlauf">📋</button>
          <button class="icon-btn" data-edit-client="${c.id}">✏️</button>
          <button class="icon-btn" data-delete-client="${c.id}">🗑️</button>
        </div>
      </div>
    </div>`).join('');
}
function attachClientsListeners(){
  document.getElementById('client-search').addEventListener('input',e=>{
    clientSearch=e.target.value;
    document.getElementById('client-list').innerHTML=renderClientList(data.clients.filter(c=>c.name.toLowerCase().includes(clientSearch.toLowerCase())));
    attachClientListItemListeners();
  });
  document.getElementById('add-client-btn').addEventListener('click',()=>openClientForm(null));
  attachClientListItemListeners();
}
function attachClientListItemListeners(){
  document.querySelectorAll('[data-history-client]').forEach(el=>el.addEventListener('click',()=>openClientHistory(data.clients.find(c=>c.id===el.dataset.historyClient))));
  document.querySelectorAll('[data-edit-client]').forEach(el=>el.addEventListener('click',()=>openClientForm(data.clients.find(c=>c.id===el.dataset.editClient))));
  document.querySelectorAll('[data-delete-client]').forEach(el=>el.addEventListener('click',()=>{
    if(!confirm('Diesen Kunden wirklich löschen?')) return;
    data.clients=data.clients.filter(c=>c.id!==el.dataset.deleteClient);
    saveData(); render();
  }));
}
function openClientForm(client){
  const c=client||{id:uid(),name:'',street:'',zipCity:'',phone:'',email:'',notes:''};
  openModal(`
    <div class="modal-header"><h3>${client?'Kunde bearbeiten':'Neuer Kunde'}</h3><button class="icon-btn" id="modal-close">✕</button></div>
    <div class="modal-body">
      <label class="field-label">Name *</label><input id="f-name" class="input" value="${esc(c.name)}">
      <label class="field-label">Straße & Hausnummer</label><input id="f-street" class="input" value="${esc(c.street)}">
      <label class="field-label">PLZ & Ort</label><input id="f-zip" class="input" value="${esc(c.zipCity)}">
      <label class="field-label">Telefon</label><input id="f-phone" class="input" value="${esc(c.phone)}">
      <label class="field-label">E-Mail</label><input id="f-email" class="input" value="${esc(c.email)}">
      <label class="field-label">Notizen</label><textarea id="f-notes" class="input" rows="2">${esc(c.notes)}</textarea>
      <button class="btn btn-primary btn-full" id="save-client">Speichern</button>
    </div>`);
  document.getElementById('modal-close').addEventListener('click',closeModal);
  document.getElementById('save-client').addEventListener('click',()=>{
    const name=document.getElementById('f-name').value.trim();
    if(!name) return;
    const updated={...c,name,street:document.getElementById('f-street').value,zipCity:document.getElementById('f-zip').value,phone:document.getElementById('f-phone').value,email:document.getElementById('f-email').value,notes:document.getElementById('f-notes').value};
    const exists=data.clients.some(x=>x.id===updated.id);
    data.clients=exists?data.clients.map(x=>x.id===updated.id?updated:x):[...data.clients,updated];
    saveData(); closeModal(); render();
  });
}
function openClientHistory(client){
  const appts=data.appointments.filter(a=>a.clientId===client.id).sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));
  openModal(`
    <div class="modal-header"><h3>Verlauf: ${esc(client.name)}</h3><button class="icon-btn" id="modal-close">✕</button></div>
    <div class="modal-body">
      ${appts.length===0?'<p class="muted center">Noch keine Termine für diesen Klienten.</p>':appts.map(a=>`
        <div class="list-row">
          <div>
            <div class="row-title">${fmtDate(a.date)}, ${a.time} – ${esc(serviceName(a.serviceId))}</div>
            ${a.notes?`<div class="muted italic">${esc(a.notes)}</div>`:''}
          </div>
          ${badge(a.status)}
        </div>`).join('')}

/* ---- Appointments ---- */
function renderAppointments(){
  let html=`
    <div class="row-gap">
      <div class="tabs">
        <button data-apptview="list" class="${apptViewMode==='list'?'active':''}">Liste</button>
        <button data-apptview="calendar" class="${apptViewMode==='calendar'?'active':''}">Kalender</button>
      </div>
      <button class="btn btn-stone" id="ics-export-btn" title="Termine für Google Kalender exportieren">📅</button>
      <button class="btn btn-primary" id="add-appt-btn">+</button>
    </div>`;
  if(data.clients.length===0) html+=`<div class="banner">Lege zuerst einen Kunden an, um Termine zu planen.</div>`;
  html+=apptViewMode==='calendar'?renderCalendarView():renderListView();
  return html;
}
function renderAppointmentCard(a){
  return `
    <div class="card">
      <div class="row-between">
        <div>
          <div class="row-title">${a.time} – ${esc(clientName(a.clientId))}</div>
          <div class="muted">${esc(serviceName(a.serviceId))}</div>
          ${a.notes?`<div class="muted italic">${esc(a.notes)}</div>`:''}
        </div>
        ${badge(a.status)}
      </div>
      <div class="actions-row">
        ${a.status!=='erledigt'?`<button class="action-chip" style="background:var(--primary-bg);color:var(--primary)" data-status="${a.id}|erledigt">Erledigt</button>`:''}
        ${a.status!=='abgesagt'?`<button class="action-chip" style="background:var(--danger-bg);color:var(--danger)" data-status="${a.id}|abgesagt">Absagen</button>`:''}
        ${a.status!=='geplant'?`<button class="action-chip btn-stone" data-status="${a.id}|geplant">Geplant</button>`:''}
        ${!a.invoiced?`<button class="action-chip" style="background:var(--accent-bg);color:var(--accent)" data-invoice-from="${a.id}">Rechnung erstellen</button>`:''}
        <button class="icon-btn" data-edit-appt="${a.id}">✏️</button>
        <button class="icon-btn" data-delete-appt="${a.id}">🗑️</button>
      </div>
    </div>`;
}
function renderListView(){
  const sorted=[...data.appointments].sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  const today=todayISO();
  const list=apptFilter==='upcoming'?sorted.filter(a=>a.date>=today):apptFilter==='past'?sorted.filter(a=>a.date<today).reverse():sorted;
  const grouped={};
  list.forEach(a=>{ (grouped[a.date]=grouped[a.date]||[]).push(a); });
  let html=`
    <div class="tabs" style="margin-bottom:12px">
      <button data-filter="upcoming" class="${apptFilter==='upcoming'?'active':''}">Kommend</button>
      <button data-filter="past" class="${apptFilter==='past'?'active':''}">Vergangen</button>
      <button data-filter="all" class="${apptFilter==='all'?'active':''}">Alle</button>
    </div>`;
  if(Object.keys(grouped).length===0) html+=`<p class="muted center">Keine Termine.</p>`;
  for(const [date,appts] of Object.entries(grouped)){
    html+=`<div class="muted" style="font-weight:600;margin:12px 0 6px;">${fmtDate(date)}</div>`;
    appts.forEach(a=>{ html+=renderAppointmentCard(a); });
  }
  return html;
}
function renderCalendarView(){
  const year=calendarDate.getFullYear();
  const month=calendarDate.getMonth();
  const days=getCalendarDays(year,month);
  const today=todayISO();
  let html=`
    <div class="card">
      <div class="calendar-nav">
        <button id="cal-prev">‹</button>
        <div class="cal-title">${monthNames[month]} ${year}</div>
        <div class="calendar-nav-actions">
          <button class="calendar-today-btn" id="cal-today">Heute</button>
          <button id="cal-next">›</button>
        </div>
      </div>
      <div class="calendar-grid">
        ${weekdayNames.map(w=>`<div class="calendar-weekday">${w}</div>`).join('')}
        ${days.map(d=>{
          if(d===null) return '<div class="calendar-day empty"></div>';
          const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const hasAppts=data.appointments.some(a=>a.date===dateStr&&a.status!=='abgesagt');
          const classes=['calendar-day'];
          if(dateStr===today) classes.push('today');
          if(dateStr===calendarSelected) classes.push('selected');
          return `<div class="${classes.join(' ')}" data-date="${dateStr}">${d}${hasAppts?'<div class="dot"></div>':''}</div>`;
        }).join('')}
      </div>
    </div>
    <div id="calendar-day-detail">${renderCalendarDayDetail()}</div>`;
  return html;
}
function renderCalendarDayDetail(){
  const appts=data.appointments.filter(a=>a.date===calendarSelected).sort((a,b)=>a.time.localeCompare(b.time));
  let html=`<div class="muted" style="font-weight:600;margin:4px 0 8px;">${fmtDate(calendarSelected)}</div>`;
  if(appts.length===0){ html+='<p class="muted center">Keine Termine an diesem Tag.</p>'; }
  else { appts.forEach(a=>{ html+=renderAppointmentCard(a); }); }
  return html;
}
function attachAppointmentsListeners(){
  document.querySelectorAll('[data-apptview]').forEach(el=>el.addEventListener('click',()=>{ apptViewMode=el.dataset.apptview; render(); }));
  document.getElementById('ics-export-btn').addEventListener('click', openICSExportModal);
  document.getElementById('add-appt-btn').addEventListener('click',()=>openAppointmentForm(null, apptViewMode==='calendar'?calendarSelected:todayISO()));
  if(apptViewMode==='calendar'){
    document.getElementById('cal-prev').addEventListener('click',()=>{ calendarDate=new Date(calendarDate.getFullYear(),calendarDate.getMonth()-1,1); render(); });
    document.getElementById('cal-next').addEventListener('click',()=>{ calendarDate=new Date(calendarDate.getFullYear(),calendarDate.getMonth()+1,1); render(); });
    document.getElementById('cal-today').addEventListener('click',()=>{ calendarDate=new Date(); calendarSelected=todayISO(); render(); });
    document.querySelectorAll('.calendar-day[data-date]').forEach(el=>el.addEventListener('click',()=>{ calendarSelected=el.dataset.date; render(); }));
  } else {
    document.querySelectorAll('[data-filter]').forEach(el=>el.addEventListener('click',()=>{ apptFilter=el.dataset.filter; render(); }));
  }
  document.querySelectorAll('[data-status]').forEach(el=>el.addEventListener('click',()=>{
    const [id,status]=el.dataset.status.split('|');
    data.appointments=data.appointments.map(a=>a.id===id?{...a,status}:a);
    saveData(); render();
  }));
  document.querySelectorAll('[data-edit-appt]').forEach(el=>el.addEventListener('click',()=>openAppointmentForm(data.appointments.find(a=>a.id===el.dataset.editAppt))));
  document.querySelectorAll('[data-delete-appt]').forEach(el=>el.addEventListener('click',()=>{
    if(!confirm('Termin wirklich löschen?')) return;
    data.appointments=data.appointments.filter(a=>a.id!==el.dataset.deleteAppt);
    saveData(); render();
  }));
  document.querySelectorAll('[data-invoice-from]').forEach(el=>el.addEventListener('click',()=>{
    createInvoiceFromAppointment(data.appointments.find(a=>a.id===el.dataset.invoiceFrom));
  }));
}
function createInvoiceFromAppointment(appt){
  const service=data.services.find(s=>s.id===appt.serviceId);
  const inv={
    id:uid(), number:nextInvoiceNumber(), clientId:appt.clientId, date:todayISO(),
    items:service?[{id:uid(),description:service.name,qty:1,price:service.price,vat:service.vat}]:[{id:uid(),description:'',qty:1,price:0,vat:19}],
    status:'offen', paidDate:null
  };
  data.invoices.push(inv);
  data.appointments=data.appointments.map(a=>a.id===appt.id?{...a,invoiced:true}:a);
  data.settings.invoiceCounter+=1;
  saveData(); currentView='invoices'; render();
}

  openModal(`

    <div class="modal-body">
      <label class="field-label">Kunde *</label>
      <select id="f-client" class="input">
        <option value="">– auswählen –</option>
        ${data.clients.map(c=>`<option value="${c.id}" ${c.id===a.clientId?'selected':''}>${esc(c.name)}</option>`).join('')}
      </select>
      <div class="grid-2">
        <div><label class="field-label">Datum</label><input id="f-date" type="date" class="input" value="${a.date}"></div>
        <div><label class="field-label">Uhrzeit</label><input id="f-time" type="time" class="input" value="${a.time}"></div>
      </div>
      <label class="field-label">Leistung</label>
      <select id="f-service" class="input">
        ${data.services.map(s=>`<option value="${s.id}" ${s.id===a.serviceId?'selected':''}>${esc(s.name)} – ${fmtMoney(s.price)}</option>`).join('')}
      </select>
      <label class="field-label">Notizen</label>
      <textarea id="f-notes" class="input" rows="2">${esc(a.notes)}</textarea>
      <button class="btn btn-primary btn-full" id="save-appt">Speichern</button>
    </div>`);
  document.getElementById('modal-close').addEventListener('click',closeModal);

    const exists=data.appointments.some(x=>x.id===updated.id);
    data.appointments=exists?data.appointments.map(x=>x.id===updated.id?updated:x):[...data.appointments,updated];

function openICSExportModal(){
  openModal(`
    <div class="modal-header"><h3>Kalender-Export (.ics)</h3><button class="icon-btn" id="modal-close">✕</button></div>
    <div class="modal-body">
      <p class="muted" style="margin-top:0">Diese Datei kann in Google Kalender importiert werden: in Google Kalender auf das Zahnrad → "Einstellungen" → "Importieren & Exportieren" → "Importieren" und die Datei auswählen. So siehst du deine Praxistermine auch in Google Kalender.</p>
      <label class="field-label">Zeitraum</label>
      <select id="ics-range" class="input">
        <option value="upcoming">Nur kommende Termine</option>
        <option value="all">Alle Termine</option>
      </select>
      <label style="display:flex;align-items:center;gap:8px;font-size:14px;margin-bottom:12px;">
        <input type="checkbox" id="ics-names" checked> Kundennamen in den Kalendereinträgen einschließen
      </label>
      <p class="muted" style="font-size:12px">Hinweis: Wird die Datei in Google Kalender importiert, werden diese Angaben auf Google-Servern gespeichert. Lass die Checkbox deaktiviert, wenn dort nur "Massagetermin" ohne Namen erscheinen soll.</p>
      <button class="btn btn-primary btn-full" id="ics-download">Herunterladen</button>
    </div>`);
  document.getElementById('modal-close').addEventListener('click',closeModal);
  document.getElementById('ics-download').addEventListener('click',()=>{
    const range=document.getElementById('ics-range').value;
    const includeNames=document.getElementById('ics-names').checked;
    const today=todayISO();
    let appts=data.appointments.filter(a=>a.status!=='abgesagt');
    if(range==='upcoming') appts=appts.filter(a=>a.date>=today);
    if(appts.length===0){ alert('Keine Termine zum Exportieren.'); return; }
    const ics=generateICS(appts,includeNames);
    downloadFile('termine.ics', ics, 'text/calendar;charset=utf-8');
    closeModal();
  });
}

/* ---- Invoices ---- */
function renderInvoices(){
  const list=[...data.invoices].sort((a,b)=>b.number.localeCompare(a.number));
  const filtered=invFilter==='all'?list:list.filter(i=>i.status===invFilter);
  let html=`
    <div class="row-gap">
      <div class="tabs">
        <button data-invfilter="all" class="${invFilter==='all'?'active':''}">Alle</button>
        <button data-invfilter="offen" class="${invFilter==='offen'?'active':''}">Offen</button>
        <button data-invfilter="bezahlt" class="${invFilter==='bezahlt'?'active':''}">Bezahlt</button>
      </div>
      <button class="btn btn-primary" id="add-invoice-btn" ${data.clients.length===0?'disabled':''}>+</button>
    </div>`;
  if(data.clients.length===0) html+=`<div class="banner">Lege zuerst einen Kunden an, um Rechnungen zu erstellen.</div>`;
  if(filtered.length===0) html+=`<p class="muted center">Keine Rechnungen.</p>`;
  filtered.forEach(inv=>{
    const t=invoiceTotal(inv);
    html+=`
      <div class="card" data-view-invoice="${inv.id}" style="cursor:pointer">
        <div class="row-between">
          <div><div class="row-title">#${esc(inv.number)} – ${esc(clientName(inv.clientId))}</div><div class="muted">${fmtDate(inv.date)}</div></div>
          <div style="text-align:right"><div class="row-title">${fmtMoney(t.gross)}</div>${badge(inv.status)}</div>
        </div>
      </div>`;
  });
  return html;
}
function attachInvoicesListeners(){
  document.querySelectorAll('[data-invfilter]').forEach(el=>el.addEventListener('click',()=>{ invFilter=el.dataset.invfilter; render(); }));
  const addBtn=document.getElementById('add-invoice-btn');
  if(addBtn) addBtn.addEventListener('click',()=>openInvoiceForm(null));
  document.querySelectorAll('[data-view-invoice]').forEach(el=>el.addEventListener('click',()=>openInvoiceDetail(data.invoices.find(i=>i.id===el.dataset.viewInvoice))));
}
function openInvoiceForm(invoice){
  const isNew=!invoice;
  const form=invoice?JSON.parse(JSON.stringify(invoice)):{
    id:uid(), number:nextInvoiceNumber(), clientId:data.clients[0]?.id||'', date:todayISO(),
    items:[{id:uid(),description:'',qty:1,price:0,vat:19}], status:'offen', paidDate:null
  };
  openModal(`
    <div class="modal-header"><h3>${isNew?'Neue Rechnung':'Rechnung #'+esc(form.number)}</h3><button class="icon-btn" id="modal-close">✕</button></div>
    <div class="modal-body">
      <div class="grid-2">
        <div><label class="field-label">Rechnungsnr.</label><input id="f-number" class="input" value="${esc(form.number)}"></div>
        <div><label class="field-label">Datum</label><input id="f-date" type="date" class="input" value="${form.date}"></div>
      </div>
      <label class="field-label">Kunde *</label>
      <select id="f-client" class="input">
        <option value="">– auswählen –</option>
        ${data.clients.map(c=>`<option value="${c.id}" ${c.id===form.clientId?'selected':''}>${esc(c.name)}</option>`).join('')}
      </select>
      <label class="field-label">Leistungen</label>
      <div id="invoice-items"></div>
      <div class="chip-row">
        <button class="chip chip-stone" id="add-position">+ Position</button>
        ${data.services.map(s=>`<button class="chip chip-emerald" data-add-service="${s.id}">+ ${esc(s.name)}</button>`).join('')}
      </div>
      <div class="totals-box" id="invoice-totals"></div>
      <button class="btn btn-primary btn-full" id="save-invoice">Speichern</button>
    </div>`);

  let items=form.items;
  function renderItems(){
    document.getElementById('invoice-items').innerHTML=items.map(item=>`
      <div class="item-row" data-item="${item.id}">
        <input class="input item-desc" data-field="description" placeholder="Beschreibung" value="${esc(item.description)}">
        <input class="input item-qty" data-field="qty" type="number" min="0" step="1" value="${item.qty}">
        <input class="input item-price" data-field="price" type="number" min="0" step="0.01" value="${item.price}">
        <select class="input item-vat" data-field="vat">
          <option value="19" ${item.vat===19?'selected':''}>19%</option>
          <option value="7" ${item.vat===7?'selected':''}>7%</option>
          <option value="0" ${item.vat===0?'selected':''}>0%</option>
        </select>
        <button class="icon-btn remove-item">✕</button>
      </div>`).join('');
    document.querySelectorAll('#invoice-items .item-row').forEach(row=>{
      const id=row.dataset.item;
      row.querySelectorAll('[data-field]').forEach(input=>{
        input.addEventListener('input',()=>{
          const item=items.find(x=>x.id===id);
          const field=input.dataset.field;
          item[field]=(field==='qty'||field==='price'||field==='vat')?(parseFloat(input.value)||0):input.value;
          renderTotals();
        });
      });
      row.querySelector('.remove-item').addEventListener('click',()=>{
        items=items.filter(x=>x.id!==id);
        renderItems(); renderTotals();
      });
    });
  }
  function renderTotals(){
    const t=invoiceTotal({items});
    document.getElementById('invoice-totals').innerHTML=`
      <div class="totals-line"><span>Netto</span><span>${fmtMoney(t.net)}</span></div>
      <div class="totals-line"><span>USt.</span><span>${fmtMoney(t.vat)}</span></div>
      <div class="totals-line totals-sum"><span>Gesamt</span><span>${fmtMoney(t.gross)}</span></div>`;
  }
  renderItems(); renderTotals();

  document.getElementById('modal-close').addEventListener('click',closeModal);
  document.getElementById('add-position').addEventListener('click',()=>{
    items.push({id:uid(),description:'',qty:1,price:0,vat:19});
    renderItems(); renderTotals();
  });
  document.querySelectorAll('[data-add-service]').forEach(btn=>btn.addEventListener('click',()=>{
    const s=data.services.find(x=>x.id===btn.dataset.addService);
    if(s){ items.push({id:uid(),description:s.name,qty:1,price:s.price,vat:s.vat}); renderItems(); renderTotals(); }
  }));
  document.getElementById('save-invoice').addEventListener('click',()=>{
    const clientId=document.getElementById('f-client').value;
    if(!clientId||items.length===0) return;
    const updated={...form,number:document.getElementById('f-number').value,date:document.getElementById('f-date').value,clientId,items};
    const exists=data.invoices.some(x=>x.id===updated.id);
    data.invoices=exists?data.invoices.map(x=>x.id===updated.id?updated:x):[...data.invoices,updated];
    if(isNew) data.settings.invoiceCounter+=1;
    saveData(); closeModal(); render();
  });
}

        </table>
        <div style="display:flex;justify-content:flex-end">
          <div style="width:200px">
            <div class="totals-line"><span>Netto</span><span>${fmtMoney(t.net)}</span></div>
            <div class="totals-line"><span>USt.</span><span>${fmtMoney(t.vat)}</span></div>
            <div class="totals-line totals-sum"><span>Gesamtbetrag</span><span>${fmtMoney(t.gross)}</span></div>
          </div>
        </div>
        ${s.iban?`<div class="muted" style="margin-top:12px">IBAN: ${esc(s.iban)}</div>`:''}
        <div style="margin-top:12px">
          ${badge(inv.status)}
          ${inv.status==='bezahlt'&&inv.paidDate?`<span class="muted"> am ${fmtDate(inv.paidDate)}</span>`:''}
        </div>
      </div>
      <div class="actions-row">
        ${inv.status==='offen'
          ?`<button class="action-chip" style="background:var(--primary-bg);color:var(--primary)" id="mark-paid">✅ Als bezahlt markieren</button>`
          :`<button class="action-chip btn-stone" id="mark-open">↩️ Als offen markieren</button>`}
        <button class="action-chip btn-stone" id="print-invoice">🖨️ Drucken</button>
        <button class="action-chip btn-stone" id="edit-invoice">✏️ Bearbeiten</button>
        <button class="action-chip" style="background:var(--danger-bg);color:var(--danger)" id="delete-invoice">🗑️ Löschen</button>
      </div>
    </div>`);
  document.getElementById('modal-close').addEventListener('click',closeModal);
  document.getElementById('print-invoice').addEventListener('click',()=>window.print());
  document.getElementById('edit-invoice').addEventListener('click',()=>{ closeModal(); openInvoiceForm(inv); });
  document.getElementById('delete-invoice').addEventListener('click',()=>{
    if(!confirm('Rechnung wirklich löschen?')) return;
    data.invoices=data.invoices.filter(i=>i.id!==inv.id);
    saveData(); closeModal(); render();
  });
  const markPaidBtn=document.getElementById('mark-paid');
  if(markPaidBtn) markPaidBtn.addEventListener('click',()=>{
    const updated={...inv,status:'bezahlt',paidDate:todayISO()};
    data.invoices=data.invoices.map(i=>i.id===inv.id?updated:i);
    saveData(); closeModal(); openInvoiceDetail(updated);
  });
  const markOpenBtn=document.getElementById('mark-open');
  if(markOpenBtn) markOpenBtn.addEventListener('click',()=>{
    const updated={...inv,status:'offen',paidDate:null};
    data.invoices=data.invoices.map(i=>i.id===inv.id?updated:i);
    saveData(); closeModal(); openInvoiceDetail(updated);
  });
}

/* ---- Bookkeeping ---- */
function monthlyBreakdown(year){
  const paidInvoices=data.invoices.filter(i=>i.status==='bezahlt'&&i.paidDate&&i.paidDate.startsWith(String(year)));
  const yearExpenses=data.expenses.filter(e=>e.date&&e.date.startsWith(String(year)));
  return Array.from({length:12},(_,m)=>{
    const mm=String(m+1).padStart(2,'0');
    const inv=paidInvoices.filter(i=>i.paidDate.slice(5,7)===mm);
    const exp=yearExpenses.filter(e=>e.date.slice(5,7)===mm);
    const incomeNet=inv.reduce((s,i)=>s+invoiceTotal(i).net,0);
    const incomeVat=inv.reduce((s,i)=>s+invoiceTotal(i).vat,0);
    const expenseSum=exp.reduce((s,e)=>s+e.amount,0);
    return {m,incomeNet,incomeVat,expenseSum,profit:incomeNet-expenseSum};
  });
}
function renderBookkeeping(){
  const monthly=monthlyBreakdown(bookYear);
  const yearExpenses=data.expenses.filter(e=>e.date&&e.date.startsWith(String(bookYear)));
  const totalIncomeNet=monthly.reduce((s,x)=>s+x.incomeNet,0);
  const totalExpense=monthly.reduce((s,x)=>s+x.expenseSum,0);
  const rows=monthly.filter(x=>x.incomeNet||x.expenseSum).map(x=>`<tr><td>${monthNames[x.m]}</td><td class="num">${fmtMoney(x.incomeNet)}</td><td class="num">${fmtMoney(x.incomeVat)}</td><td class="num">${fmtMoney(x.expenseSum)}</td><td class="num">${fmtMoney(x.profit)}</td></tr>`).join('');
  return `
    <div class="year-nav">
      <button id="year-prev">‹</button>
      <div style="font-weight:600">${bookYear}</div>
      <button id="year-next">›</button>
    </div>
    <div class="grid-3" style="margin-bottom:12px">
      <div class="stat stat-emerald"><div class="stat-label">Einnahmen</div><div class="stat-value">${fmtMoney(totalIncomeNet)}</div></div>
      <div class="stat stat-amber"><div class="stat-label">Ausgaben</div><div class="stat-value">${fmtMoney(totalExpense)}</div></div>
      <div class="stat stat-emerald"><div class="stat-label">Gewinn</div><div class="stat-value">${fmtMoney(totalIncomeNet-totalExpense)}</div></div>
    </div>
    <button class="btn btn-stone btn-full" id="export-csv">⬇️ Als CSV exportieren</button>
    <div class="card" style="overflow-x:auto;margin-top:12px">
      <table class="book-table">
        <thead><tr><th>Monat</th><th class="num">Einnahmen</th><th class="num">USt.</th><th class="num">Ausgaben</th><th class="num">Gewinn</th></tr></thead>
        <tbody>${rows||`<tr><td colspan="5" class="center muted">Keine Daten für ${bookYear}.</td></tr>`}</tbody>
      </table>
    </div>
    <div class="card">
      <div class="row-between" style="margin-bottom:8px"><h3 style="margin:0">Ausgaben</h3><button class="btn btn-stone" id="add-expense-btn">+ Neu</button></div>
      ${yearExpenses.length===0?`<p class="muted">Keine Ausgaben in ${bookYear}.</p>`:''}
      ${yearExpenses.sort((a,b)=>b.date.localeCompare(a.date)).map(e=>`
        <div class="list-row">
          <div><div class="row-title">${esc(e.description)}</div><div class="muted">${fmtDate(e.date)} · ${esc(e.category)}</div></div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="row-title">${fmtMoney(e.amount)}</span>
            <button class="icon-btn" data-edit-expense="${e.id}">✏️</button>
            <button class="icon-btn" data-delete-expense="${e.id}">🗑️</button>
          </div>
        </div>`).join('')}
    </div>`;
}
function attachBookkeepingListeners(){
  document.getElementById('year-prev').addEventListener('click',()=>{ bookYear--; render(); });
  document.getElementById('year-next').addEventListener('click',()=>{ bookYear++; render(); });
  document.getElementById('export-csv').addEventListener('click',exportCSV);
  document.getElementById('add-expense-btn').addEventListener('click',()=>openExpenseForm(null));
  document.querySelectorAll('[data-edit-expense]').forEach(el=>el.addEventListener('click',()=>openExpenseForm(data.expenses.find(e=>e.id===el.dataset.editExpense))));
  document.querySelectorAll('[data-delete-expense]').forEach(el=>el.addEventListener('click',()=>{
    if(!confirm('Ausgabe wirklich löschen?')) return;
    data.expenses=data.expenses.filter(e=>e.id!==el.dataset.deleteExpense);
    saveData(); render();
  }));
}
function exportCSV(){
  const monthly=monthlyBreakdown(bookYear);
  let csv='Monat;Einnahmen Netto;USt eingenommen;Ausgaben;Gewinn\n';
  monthly.forEach(x=>{ csv+=`${monthNames[x.m]};${x.incomeNet.toFixed(2)};${x.incomeVat.toFixed(2)};${x.expenseSum.toFixed(2)};${x.profit.toFixed(2)}\n`; });
  const totalIncomeNet=monthly.reduce((s,x)=>s+x.incomeNet,0);
  const totalIncomeVat=monthly.reduce((s,x)=>s+x.incomeVat,0);
  const totalExpense=monthly.reduce((s,x)=>s+x.expenseSum,0);
  csv+=`Gesamt;${totalIncomeNet.toFixed(2)};${totalIncomeVat.toFixed(2)};${totalExpense.toFixed(2)};${(totalIncomeNet-totalExpense).toFixed(2)}\n`;
  downloadFile(`buchhaltung-${bookYear}.csv`, csv, 'text/csv;charset=utf-8;');
}
function openExpenseForm(expense){
  const e=expense?{...expense}:{id:uid(),date:todayISO(),description:'',category:expenseCategories[0],amount:0};
  openModal(`
    <div class="modal-header"><h3>${expense?'Ausgabe bearbeiten':'Neue Ausgabe'}</h3><button class="icon-btn" id="modal-close">✕</button></div>
    <div class="modal-body">
      <label class="field-label">Datum</label><input id="f-date" type="date" class="input" value="${e.date}">
      <label class="field-label">Beschreibung</label><input id="f-desc" class="input" value="${esc(e.description)}">
      <label class="field-label">Kategorie</label>
      <select id="f-cat" class="input">${expenseCategories.map(c=>`<option ${c===e.category?'selected':''}>${esc(c)}</option>`).join('')}</select>
      <label class="field-label">Betrag (€)</label><input id="f-amount" type="number" min="0" step="0.01" class="input" value="${e.amount}">
      <button class="btn btn-primary btn-full" id="save-expense">Speichern</button>
    </div>`);
  document.getElementById('modal-close').addEventListener('click',closeModal);
  document.getElementById('save-expense').addEventListener('click',()=>{
    const description=document.getElementById('f-desc').value.trim();
    if(!description) return;
    const updated={...e,description,date:document.getElementById('f-date').value,category:document.getElementById('f-cat').value,amount:parseFloat(document.getElementById('f-amount').value)||0};
    const exists=data.expenses.some(x=>x.id===updated.id);
    data.expenses=exists?data.expenses.map(x=>x.id===updated.id?updated:x):[...data.expenses,updated];
    saveData(); closeModal(); render();
  });
}

/* ---- Settings ---- */
function renderSettings(){
  const s=data.settings;
  return `
    <div class="card">
      <h3>Praxisdaten</h3>
      <label class="field-label">Praxis-/Firmenname</label><input id="s-businessName" class="input" value="${esc(s.businessName)}">
      <label class="field-label">Inhaber/in</label><input id="s-ownerName" class="input" value="${esc(s.ownerName)}">
      <label class="field-label">Straße & Hausnummer</label><input id="s-street" class="input" value="${esc(s.street)}">
      <label class="field-label">PLZ & Ort</label><input id="s-zipCity" class="input" value="${esc(s.zipCity)}">
      <label class="field-label">USt-IdNr. / Steuernummer</label><input id="s-taxId" class="input" value="${esc(s.taxId)}">
      <label class="field-label">E-Mail</label><input id="s-email" class="input" value="${esc(s.email)}">
      <label class="field-label">Telefon</label><input id="s-phone" class="input" value="${esc(s.phone)}">
      <label class="field-label">IBAN</label><input id="s-iban" class="input" value="${esc(s.iban)}">
      <button class="btn btn-primary btn-full" id="save-business">Speichern</button>
    </div>
    <div class="card">
      <h3>Rechnungsnummer</h3>
      <div class="grid-2">
        <div><label class="field-label">Präfix</label><input id="s-prefix" class="input" value="${esc(s.invoicePrefix)}"></div>
        <div><label class="field-label">Nächste Nummer</label><input id="s-counter" type="number" min="1" class="input" value="${s.invoiceCounter}"></div>
      </div>
      <div class="muted" style="margin-bottom:8px">Nächste Rechnung: #${nextInvoiceNumber()}</div>
      <button class="btn btn-primary btn-full" id="save-invoicing">Speichern</button>
    </div>
    <div class="card">
      <div class="row-between" style="margin-bottom:8px"><h3 style="margin:0">Leistungen & Preise</h3><button class="btn btn-stone" id="add-service-btn">+ Neu</button></div>
      ${data.services.map(srv=>`
        <div class="list-row">
          <div><div class="row-title">${esc(srv.name)}</div><div class="muted">${srv.duration>0?srv.duration+' Min · ':''}${fmtMoney(srv.price)} netto · ${srv.vat}% USt</div></div>
          <div style="display:flex;gap:4px">
            <button class="icon-btn" data-edit-service="${srv.id}">✏️</button>
            <button class="icon-btn" data-delete-service="${srv.id}">🗑️</button>
          </div>
        </div>`).join('')}
    </div>
    <div class="card">
      <h3>Daten & Datenschutz</h3>
      <p class="muted" style="margin-top:0">Alle Daten werden ausschließlich lokal auf diesem Gerät in diesem Browser gespeichert – es gibt keine Cloud-Übertragung. Erstelle regelmäßig ein Backup, falls du den Browser-Speicher löschst oder das Gerät wechselst.</p>
      <div class="grid-2">
        <button class="btn btn-stone" id="export-data">⬇️ Backup exportieren</button>
        <label class="btn btn-stone" style="text-align:center;cursor:pointer">⬆️ Backup importieren<input type="file" id="import-data" accept="application/json" style="display:none"></label>
      </div>
      <button class="btn btn-full" style="background:var(--danger-bg);color:var(--danger);margin-top:8px" id="delete-all">Alle Daten löschen</button>
    </div>
    <p class="muted center" style="font-size:12px">
      Hinweis: Zahlungen über PayPal (Zahlungsanforderung/Link) werden außerhalb dieser App abgewickelt. Sobald eine Zahlung eingegangen ist, markiere die jeweilige Rechnung hier einfach als "bezahlt" – das ist für deine Buchhaltung wichtig. Bitte lass die steuerliche Einordnung deiner Leistungen (USt-Sätze, Kleinunternehmerregelung) von einem Steuerberater prüfen.
    </p>`;
}
function attachSettingsListeners(){
  document.getElementById('save-business').addEventListener('click',()=>{
    data.settings={...data.settings,
      businessName:document.getElementById('s-businessName').value,
      ownerName:document.getElementById('s-ownerName').value,
      street:document.getElementById('s-street').value,
      zipCity:document.getElementById('s-zipCity').value,
      taxId:document.getElementById('s-taxId').value,
      email:document.getElementById('s-email').value,
      phone:document.getElementById('s-phone').value,
      iban:document.getElementById('s-iban').value,
    };
    saveData(); render();
  });
  document.getElementById('save-invoicing').addEventListener('click',()=>{
    data.settings={...data.settings, invoicePrefix:document.getElementById('s-prefix').value, invoiceCounter:parseInt(document.getElementById('s-counter').value)||1};
    saveData(); render();
  });
  document.getElementById('add-service-btn').addEventListener('click',()=>openServiceForm(null));
  document.querySelectorAll('[data-edit-service]').forEach(el=>el.addEventListener('click',()=>openServiceForm(data.services.find(s=>s.id===el.dataset.editService))));
  document.querySelectorAll('[data-delete-service]').forEach(el=>el.addEventListener('click',()=>{
    if(!confirm('Leistung wirklich löschen?')) return;
    data.services=data.services.filter(s=>s.id!==el.dataset.deleteService);
    saveData(); render();
  }));
  document.getElementById('export-data').addEventListener('click',()=>{
    downloadFile(`praxis-backup-${todayISO()}.json`, JSON.stringify(data,null,2), 'application/json');
  });
  document.getElementById('import-data').addEventListener('change',(e)=>{
    const file=e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=()=>{
      try{
        const p=JSON.parse(reader.result);
        if(!confirm('Backup importieren? Aktuelle Daten werden überschrieben.')) return;
        data={
          clients:p.clients||[], appointments:p.appointments||[],
          services:(p.services&&p.services.length)?p.services:defaultServices,
          invoices:p.invoices||[], expenses:p.expenses||[],
          settings:{...defaultSettings, ...(p.settings||{})}
        };
        saveData(); render();
        alert('Backup importiert.');
      }catch(err){ alert('Diese Datei konnte nicht gelesen werden.'); }
    };
    reader.readAsText(file);
  });
  document.getElementById('delete-all').addEventListener('click',()=>{
    if(!confirm('Wirklich ALLE Daten unwiderruflich löschen?')) return;
    if(!confirm('Bist du sicher? Dies kann nicht rückgängig gemacht werden.')) return;
    data={clients:[],appointments:[],services:defaultServices,invoices:[],expenses:[],settings:defaultSettings};
    saveData(); render();
  });
}
function openServiceForm(service){
  const s=service?{...service}:{id:uid(),name:'',duration:30,price:0,vat:19};
  openModal(`
    <div class="modal-header"><h3>${service?'Leistung bearbeiten':'Neue Leistung'}</h3><button class="icon-btn" id="modal-close">✕</button></div>
    <div class="modal-body">
      <label class="field-label">Bezeichnung</label><input id="f-name" class="input" value="${esc(s.name)}">
      <div class="grid-3">
        <div><label class="field-label">Dauer (Min)</label><input id="f-duration" type="number" min="0" class="input" value="${s.duration}"></div>
        <div><label class="field-label">Preis netto (€)</label><input id="f-price" type="number" min="0" step="0.01" class="input" value="${s.price}"></div>
        <div><label class="field-label">USt %</label>
          <select id="f-vat" class="input">
            <option value="19" ${s.vat===19?'selected':''}>19%</option>
            <option value="7" ${s.vat===7?'selected':''}>7%</option>
            <option value="0" ${s.vat===0?'selected':''}>0%</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary btn-full" id="save-service">Speichern</button>
    </div>`);
  document.getElementById('modal-close').addEventListener('click',closeModal);
  document.getElementById('save-service').addEventListener('click',()=>{
    const name=document.getElementById('f-name').value.trim();
    if(!name) return;
    const updated={...s,name,duration:parseInt(document.getElementById('f-duration').value)||0,price:parseFloat(document.getElementById('f-price').value)||0,vat:parseFloat(document.getElementById('f-vat').value)};
    const exists=data.services.some(x=>x.id===updated.id);
    data.services=exists?data.services.map(x=>x.id===updated.id?updated:x):[...data.services,updated];
    saveData(); closeModal(); render();
  });
}

/* ---- Init ---- */
loadData();
render();
document.querySelectorAll('.bottom-nav button').forEach(btn=>btn.addEventListener('click',()=>setView(btn.dataset.view)));
document.getElementById('settings-btn').addEventListener('click',()=>setView('settings'));

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
</script>
</body>
